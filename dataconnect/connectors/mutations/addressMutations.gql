# ============================================
# ADDRESS MUTATIONS
# ============================================

mutation AddEmployeeAddress(
  $employeeId:   UUID!
  $addressType:  String!
  $addressLine1: String!
  $addressLine2: String
  $city:         String!
  $state:        String
  $postalCode:   String
  $country:      String!
  $isPrimary:    Boolean!
  $createdBy:    String!
) @auth(level: USER_EMAIL_VERIFIED) {
  employeeAddress_insert(data: {
    employeeId:   $employeeId
    addressType:  $addressType
    addressLine1: $addressLine1
    addressLine2: $addressLine2
    city:         $city
    state:        $state
    postalCode:   $postalCode
    country:      $country
    isPrimary:    $isPrimary
    createdBy:    $createdBy
    updatedBy:    $createdBy
  }) {
    id
    addressType
    city
    country
    isPrimary
    createdAt
  }
}

mutation UpdateEmployeeAddress(
  $id:           UUID!
  $addressLine1: String
  $addressLine2: String
  $city:         String
  $state:        String
  $postalCode:   String
  $country:      String
  $isPrimary:    Boolean
  $isActive:     Boolean
  $updatedBy:    String!
) @auth(level: USER_EMAIL_VERIFIED) {
  employeeAddress_update(
    id: $id
    data: {
      addressLine1: $addressLine1
      addressLine2: $addressLine2
      city:         $city
      state:        $state
      postalCode:   $postalCode
      country:      $country
      isPrimary:    $isPrimary
      isActive:     $isActive
      updatedBy:    $updatedBy
    }
  ) {
    id
    city
    isPrimary
    updatedAt
  }
}