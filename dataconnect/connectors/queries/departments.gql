# ============================================
# DEPARTMENT QUERIES
# ============================================

# Get all active departments
query ListDepartments(
  $isActive: Boolean = true
) @auth(level: USER_EMAIL_VERIFIED) {
  departments(
    where:   { isActive: { eq: $isActive } }
    orderBy: [{ name: ASC }]
  ) {
    id
    name
    code
    description
    isActive
    createdAt
  }
}

# Get department by ID with employees and projects
query GetDepartmentById(
  $id: UUID!
) @auth(level: USER_EMAIL_VERIFIED) {
  department(id: $id) {
    id
    name
    code
    description
    isActive
    createdAt
    updatedAt
    createdBy
    updatedBy
    employees(
      where:   { isActive: { eq: true } }
      orderBy: [{ lastName: ASC }]
    ) {
      id
      employeeNumber
      firstName
      lastName
      email
      jobTitle
      employmentStatus
      profilePicture
    }
    projects(
      where:   { isActive: { eq: true } }
      orderBy: [{ name: ASC }]
    ) {
      id
      name
      code
      status
      priority
      startDate
      endDate
    }
  }
}

# Get department with employee count summary
query GetDepartmentSummary @auth(level: USER_EMAIL_VERIFIED) {
  departments(
    where:   { isActive: { eq: true } }
    orderBy: [{ name: ASC }]
  ) {
    id
    name
    code
    description
    isActive
    employees(where: { isActive: { eq: true } }) {
      id
      employmentStatus
    }
    projects(where: { isActive: { eq: true } }) {
      id
      status
    }
  }
}