# ============================================
# DOCKER COMPOSE - LOCAL DEVELOPMENT
# Services:
#   1. postgres  - Local PostgreSQL database
#   2. flyway    - Database migration runner
#   3. pgadmin   - Optional DB GUI (lightweight)
# ============================================

version: '3.9'

networks:
  clsql-network:
    driver: bridge
    name: clsql-network

volumes:
  postgres_data:
    name: clsql_postgres_data
  pgadmin_data:
    name: clsql_pgadmin_data

services:

  # ==========================================
  # POSTGRESQL DATABASE
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: clsql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: employee_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - clsql-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employee_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c log_min_duration_statement=1000
      -c log_connections=on
      -c log_disconnections=on
      -c log_duration=off
      -c log_statement=none

  # ==========================================
  # FLYWAY MIGRATION RUNNER
  # Runs all migrations on startup
  # Waits for postgres to be healthy first
  # ==========================================
  flyway:
    image: flyway/flyway:10-alpine
    container_name: clsql_flyway
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/employee_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_SCHEMAS: public
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_VALIDATE_ON_MIGRATE: "true"
      FLYWAY_OUT_OF_ORDER: "false"
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_CONNECT_RETRIES: 10
      FLYWAY_DEFAULT_SCHEMA: public
    volumes:
      - ./migrations:/flyway/sql
      - ./docker/flyway/flyway.conf:/flyway/conf/flyway.conf
    networks:
      - clsql-network
    command: migrate

  # ==========================================
  # PGADMIN - OPTIONAL WEB DATABASE GUI
  # Access at http://localhost:5050
  # Email: admin@clsql.local
  # Password: admin
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: clsql_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clsql.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
    networks:
      - clsql-network
    profiles:
      - tools